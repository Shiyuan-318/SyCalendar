<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyCalendar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #667eea);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460, #1a1a2e);
            background-size: 400% 400%;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        body.dark-mode .shape {
            opacity: 0.05;
        }

        .shape:nth-child(1) {
            width: 300px;
            height: 300px;
            background: white;
            top: -150px;
            left: -100px;
            animation-delay: 0s;
            animation-duration: 25s;
        }

        .shape:nth-child(2) {
            width: 200px;
            height: 200px;
            background: #f093fb;
            top: 50%;
            right: -100px;
            animation-delay: -5s;
            animation-duration: 20s;
        }

        .shape:nth-child(3) {
            width: 150px;
            height: 150px;
            background: #667eea;
            bottom: -75px;
            left: 20%;
            animation-delay: -10s;
            animation-duration: 22s;
        }

        .shape:nth-child(4) {
            width: 250px;
            height: 250px;
            background: #764ba2;
            top: 30%;
            left: 60%;
            animation-delay: -15s;
            animation-duration: 28s;
        }

        .shape:nth-child(5) {
            width: 180px;
            height: 180px;
            background: white;
            bottom: 20%;
            right: 20%;
            animation-delay: -8s;
            animation-duration: 18s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
            25% {
                transform: translate(50px, -50px) rotate(90deg) scale(1.1);
            }
            50% {
                transform: translate(-30px, 30px) rotate(180deg) scale(0.9);
            }
            75% {
                transform: translate(40px, 20px) rotate(270deg) scale(1.05);
            }
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 22px;
            transition: all 0.25s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(15deg);
            background: rgba(255, 255, 255, 0.35);
        }

        body.dark-mode .theme-toggle {
            background: rgba(255, 255, 255, 0.1);
        }

        body.dark-mode .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .calendar-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            width: 100%;
            max-width: 480px;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 1;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        body.dark-mode .calendar-container {
            background: rgba(30, 30, 46, 0.95);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
        }

        .calendar-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 25px;
            text-align: center;
            position: relative;
            transition: background 0.3s ease;
        }

        body.dark-mode .calendar-header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0d1b2a 100%);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.25s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.15) rotate(10deg);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        .month-year {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .month-year.animating {
            transform: scale(0.8);
            opacity: 0;
        }

        .year-display {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
            font-weight: 400;
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .year-display.animating {
            transform: translateY(-10px);
            opacity: 0;
        }

        .today-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.25s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            margin-top: 15px;
        }

        .today-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.05);
        }

        .today-btn:active {
            transform: scale(0.95);
        }

        .calendar-body {
            padding: 25px;
            position: relative;
            overflow: hidden;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 15px;
        }

        .weekday {
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #888;
            padding: 10px 0;
            transition: color 0.3s ease;
        }

        body.dark-mode .weekday {
            color: #6c7086;
        }

        .weekday:first-child,
        .weekday:last-child {
            color: #e74c3c;
        }

        body.dark-mode .weekday:first-child,
        body.dark-mode .weekday:last-child {
            color: #f38ba8;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            position: relative;
        }

        .days-wrapper {
            position: relative;
            width: 100%;
        }

        .days {
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .days.slide-left {
            transform: translateX(-100%);
            opacity: 0;
        }

        .days.slide-right {
            transform: translateX(100%);
            opacity: 0;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 500;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            color: #333;
        }

        body.dark-mode .day {
            color: #cdd6f4;
        }

        .day:hover:not(.empty):not(.today):not(.other-month) {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.15) rotate(5deg);
        }

        body.dark-mode .day:hover:not(.empty):not(.today):not(.other-month) {
            background: linear-gradient(135deg, #45475a 0%, #585b70 100%);
        }

        .day.empty {
            cursor: default;
        }

        .day.other-month {
            color: #ccc;
        }

        body.dark-mode .day.other-month {
            color: #45475a;
        }

        .day.weekend {
            color: #e74c3c;
        }

        body.dark-mode .day.weekend {
            color: #f38ba8;
        }

        .day.weekend.other-month {
            color: #f5b7b1;
        }

        body.dark-mode .day.weekend.other-month {
            color: #6c7086;
        }

        .day.today {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 700;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            animation: pulse 2s infinite;
        }

        body.dark-mode .day.today {
            background: linear-gradient(135deg, #89b4fa 0%, #74c7ec 100%);
            box-shadow: 0 5px 20px rgba(137, 180, 250, 0.4);
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            }
            50% {
                box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
            }
        }

        body.dark-mode .day.today {
            animation: pulseDark 2s infinite;
        }

        @keyframes pulseDark {
            0%, 100% {
                box-shadow: 0 5px 20px rgba(137, 180, 250, 0.4);
            }
            50% {
                box-shadow: 0 8px 30px rgba(137, 180, 250, 0.6);
            }
        }

        .day.selected {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
            transform: scale(1.1);
        }

        body.dark-mode .day.selected {
            background: linear-gradient(135deg, #a6e3a1 0%, #94e2d5 100%);
            box-shadow: 0 5px 20px rgba(166, 227, 161, 0.4);
        }

        .day.has-event::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 5px;
            height: 5px;
            background: #e74c3c;
            border-radius: 50%;
        }

        .day.today.has-event::after {
            background: white;
        }

        .calendar-footer {
            padding: 20px 25px 25px;
            border-top: 1px solid #eee;
            text-align: center;
            transition: border-color 0.3s ease;
        }

        body.dark-mode .calendar-footer {
            border-top-color: #313244;
        }

        .selected-date {
            font-size: 14px;
            color: #666;
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55), color 0.3s ease;
        }

        body.dark-mode .selected-date {
            color: #a6adc8;
        }

        .selected-date span {
            font-weight: 600;
            color: #667eea;
        }

        body.dark-mode .selected-date span {
            color: #89b4fa;
        }

        .lunar-info {
            margin-top: 8px;
            font-size: 13px;
            color: #999;
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55), color 0.3s ease;
        }

        body.dark-mode .lunar-info {
            color: #6c7086;
        }

        @keyframes dayFadeIn {
            0% {
                opacity: 0;
                transform: translateY(15px) scale(0.5);
            }
            60% {
                transform: translateY(-3px) scale(1.1);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .day.animate-in {
            animation: dayFadeIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        @media (max-width: 500px) {
            .calendar-container {
                border-radius: 20px;
            }
            
            .calendar-header {
                padding: 25px 20px;
            }
            
            .month-year {
                font-size: 24px;
            }
            
            .calendar-body {
                padding: 20px 15px;
            }
            
            .day {
                font-size: 14px;
            }

            .theme-toggle {
                width: 44px;
                height: 44px;
                font-size: 20px;
                top: 15px;
                right: 15px;
            }

            .shape:nth-child(1) { width: 150px; height: 150px; }
            .shape:nth-child(2) { width: 100px; height: 100px; }
            .shape:nth-child(3) { width: 80px; height: 80px; }
            .shape:nth-child(4) { width: 120px; height: 120px; }
            .shape:nth-child(5) { width: 90px; height: 90px; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
    
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="calendar-container">
        <div class="calendar-header">
            <div class="header-top">
                <button class="nav-btn" id="prevMonth">‹</button>
                <div>
                    <div class="month-year" id="monthYear"></div>
                    <div class="year-display" id="yearDisplay"></div>
                </div>
                <button class="nav-btn" id="nextMonth">›</button>
            </div>
            <button class="today-btn" id="todayBtn">回到今天</button>
        </div>
        
        <div class="calendar-body">
            <div class="weekdays">
                <div class="weekday">日</div>
                <div class="weekday">一</div>
                <div class="weekday">二</div>
                <div class="weekday">三</div>
                <div class="weekday">四</div>
                <div class="weekday">五</div>
                <div class="weekday">六</div>
            </div>
            <div class="days-wrapper">
                <div class="days" id="days"></div>
            </div>
        </div>
        
        <div class="calendar-footer">
            <div class="selected-date" id="selectedDate"></div>
            <div class="lunar-info" id="lunarInfo"></div>
        </div>
    </div>

    <script>
        const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', 
                           '七月', '八月', '九月', '十月', '十一月', '十二月'];
        
        const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        
        let currentDate = new Date();
        let selectedDate = new Date();
        let isAnimating = false;

        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.textContent = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        function renderCalendar(direction = null) {
            if (isAnimating) return;
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const daysContainer = document.getElementById('days');
            const monthYearEl = document.getElementById('monthYear');
            const yearDisplayEl = document.getElementById('yearDisplay');
            
            if (direction) {
                isAnimating = true;
                
                monthYearEl.classList.add('animating');
                yearDisplayEl.classList.add('animating');
                
                if (direction === 'prev') {
                    daysContainer.classList.add('slide-right');
                } else {
                    daysContainer.classList.add('slide-left');
                }
                
                setTimeout(() => {
                    updateCalendarContent(year, month, daysContainer, monthYearEl, yearDisplayEl);
                    
                    daysContainer.classList.remove('slide-left', 'slide-right');
                    daysContainer.style.opacity = '0';
                    daysContainer.style.transform = direction === 'prev' ? 'translateX(-100%)' : 'translateX(100%)';
                    
                    requestAnimationFrame(() => {
                        daysContainer.style.transition = 'all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
                        daysContainer.style.opacity = '1';
                        daysContainer.style.transform = 'translateX(0)';
                    });
                    
                    setTimeout(() => {
                        monthYearEl.classList.remove('animating');
                        yearDisplayEl.classList.remove('animating');
                        isAnimating = false;
                    }, 150);
                }, 150);
            } else {
                updateCalendarContent(year, month, daysContainer, monthYearEl, yearDisplayEl);
            }
        }

        function updateCalendarContent(year, month, daysContainer, monthYearEl, yearDisplayEl) {
            monthYearEl.textContent = monthNames[month];
            yearDisplayEl.textContent = `${year}年`;
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startingDay = firstDay.getDay();
            const totalDays = lastDay.getDate();
            
            const prevMonthLastDay = new Date(year, month, 0).getDate();
            
            daysContainer.innerHTML = '';
            
            const today = new Date();
            const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
            
            let delay = 0;
            
            for (let i = startingDay - 1; i >= 0; i--) {
                const dayEl = document.createElement('div');
                dayEl.className = 'day other-month';
                dayEl.textContent = prevMonthLastDay - i;
                dayEl.style.animationDelay = `${delay * 0.015}s`;
                dayEl.classList.add('animate-in');
                daysContainer.appendChild(dayEl);
                delay++;
            }
            
            for (let day = 1; day <= totalDays; day++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'day animate-in';
                dayEl.textContent = day;
                dayEl.style.animationDelay = `${delay * 0.015}s`;
                
                const dayOfWeek = new Date(year, month, day).getDay();
                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    dayEl.classList.add('weekend');
                }
                
                if (isCurrentMonth && day === today.getDate()) {
                    dayEl.classList.add('today');
                }
                
                if (selectedDate.getFullYear() === year && 
                    selectedDate.getMonth() === month && 
                    selectedDate.getDate() === day &&
                    !(isCurrentMonth && day === today.getDate())) {
                    dayEl.classList.add('selected');
                }
                
                dayEl.addEventListener('click', () => selectDate(year, month, day));
                daysContainer.appendChild(dayEl);
                delay++;
            }
            
            const remainingDays = 42 - (startingDay + totalDays);
            for (let i = 1; i <= remainingDays; i++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'day other-month animate-in';
                dayEl.textContent = i;
                dayEl.style.animationDelay = `${delay * 0.015}s`;
                daysContainer.appendChild(dayEl);
                delay++;
            }
            
            updateSelectedDisplay();
        }

        function selectDate(year, month, day) {
            selectedDate = new Date(year, month, day);
            
            document.querySelectorAll('.day.selected').forEach(el => {
                el.classList.remove('selected');
            });
            
            const today = new Date();
            const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
            
            document.querySelectorAll('.day').forEach(el => {
                if (el.textContent == day && !el.classList.contains('other-month')) {
                    if (!(isCurrentMonth && day === today.getDate())) {
                        el.classList.add('selected');
                    }
                }
            });
            
            updateSelectedDisplay();
        }

        function updateSelectedDisplay() {
            const year = selectedDate.getFullYear();
            const month = selectedDate.getMonth() + 1;
            const day = selectedDate.getDate();
            const dayOfWeek = selectedDate.getDay();
            
            document.getElementById('selectedDate').innerHTML = 
                `已选择: <span>${year}年${month}月${day}日 ${weekDays[dayOfWeek]}</span>`;
            
            const lunarInfo = getLunarInfo(selectedDate);
            document.getElementById('lunarInfo').textContent = lunarInfo;
        }

        function getLunarInfo(date) {
            const lunarMonths = ['正', '二', '三', '四', '五', '六', '七', '八', '九', '十', '冬', '腊'];
            const lunarDays = ['初一', '初二', '初三', '初四', '初五', '初六', '初七', '初八', '初九', '初十',
                              '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十',
                              '廿一', '廿二', '廿三', '廿四', '廿五', '廿六', '廿七', '廿八', '廿九', '三十'];
            
            const dayOfYear = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
            const lunarMonth = lunarMonths[(dayOfYear % 12)];
            const lunarDay = lunarDays[(dayOfYear % 30)];
            
            return `农历 ${lunarMonth}月${lunarDay}`;
        }

        document.getElementById('prevMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar('prev');
        });

        document.getElementById('nextMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar('next');
        });

        document.getElementById('todayBtn').addEventListener('click', () => {
            currentDate = new Date();
            selectedDate = new Date();
            renderCalendar();
        });

        renderCalendar();
    </script>
</body>
</html>
